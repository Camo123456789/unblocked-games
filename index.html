<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unblocked Games Portal</title>
  </head>
  <body>
    <div id="app" class="min-h-screen bg-slate-950 flex flex-col">
      <!-- Nav -->
      <header class="sticky top-0 z-40 bg-slate-950/80 backdrop-blur-xl border-b border-slate-800 shadow-2xl">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between gap-4">
          <div class="flex items-center gap-3">
            <div class="p-2.5 bg-indigo-600 rounded-xl">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line><rect width="20" height="12" x="2" y="6" rx="2"></rect></svg>
            </div>
            <h1 class="text-2xl font-black tracking-tighter text-white hidden sm:block">
              UNBLOCKED<span class="text-indigo-500">PLAY</span>
            </h1>
          </div>

          <div class="flex-1 max-w-xl relative">
            <input
              type="text"
              id="search-input"
              placeholder="Search unblocked games..."
              class="w-full bg-slate-900/50 border border-slate-800 text-white pl-12 pr-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all"
            />
          </div>
        </div>
      </header>

      <!-- Main -->
      <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-8">
        <div id="games-grid" class="games-grid">
          <!-- Games will be injected here -->
        </div>
      </main>

      <!-- Overlay Player -->
      <div id="player-overlay" class="fixed inset-0 z-50 bg-slate-950 flex flex-col hidden">
        <div class="flex items-center justify-between px-6 py-3 border-b border-slate-800 bg-slate-900">
          <h2 id="current-game-title" class="text-lg font-bold text-white"></h2>
          <button id="close-player" class="p-2 text-slate-400 hover:text-white">Close</button>
        </div>
        <div class="flex-1 bg-black">
          <iframe id="game-iframe" class="w-full h-full border-0" allowfullscreen></iframe>
        </div>
      </div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
